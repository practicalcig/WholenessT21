plugins {
    id 'com.android.application'
}

android {
    namespace "com.team21.wholeness"
    compileSdk 34

    defaultConfig {
        applicationId "com.team21.wholeness"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        debug {
            // debuggable APK, no minification
            minifyEnabled false
        }
        release {
            minifyEnabled false
            shrinkResources false
            // For now, sign the release APK with the debug key so it installs without extra setup.
            // For Play Store, replace with a release keystore.
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    packagingOptions {
        resources {
            excludes += ['META-INF/DEPENDENCIES', 'META-INF/LICENSE*', 'META-INF/NOTICE*']
        }
    }
}

dependencies {
    // No third-party deps required - we only use the Android framework.
}
